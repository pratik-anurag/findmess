services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-findmesh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-findmesh}
      POSTGRES_DB: ${POSTGRES_DB:-findmesh}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
    profiles: ["nats"]

  backend:
    build:
      context: ./backend
    env_file: .env.example
    environment:
      FINDMESH_HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://findmesh:findmesh@postgres:5432/findmesh?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  admin-dashboard:
    build:
      context: ./web/admin-dashboard
    environment:
      VITE_FINDMESH_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
